syntax = "proto3";

package banquito.core.accounting.v1;

option java_package = "com.banquito.core.accounting.infrastructure.grpc";
option java_multiple_files = true;

service AccountingService {
  rpc GetCurrentAccountingDate(CurrentAccountingDateRequest) returns (AccountingDateReply);
  rpc ResolveOperationAccountingDate(CurrentAccountingDateRequest) returns (AccountingDateReply);
  rpc CreateJournalEntry(CreateJournalEntryRequest) returns (JournalEntryReply);
  rpc GetJournalEntryByTransactionUuid(JournalEntryByTransactionRequest) returns (JournalEntryLookupReply);
  rpc CreateReversalJournalEntry(CreateReversalJournalEntryRequest) returns (JournalEntryReply);
  rpc GetInstitutionalAccountByFunctionalCode(InstitutionalAccountRequest) returns (InstitutionalAccountReply);
  rpc RunEod(RunEodRequest) returns (EodReply);
  rpc GetTrialBalance(TrialBalanceRequest) returns (TrialBalanceReply);
}

message CurrentAccountingDateRequest {}
message AccountingDateReply { string accounting_date = 1; string status = 2; }
message CreateJournalEntryRequest { string correlation_id = 1; string payload_json = 2; }
message CreateReversalJournalEntryRequest { string original_journal_entry_uuid = 1; string reason = 2; }
message JournalEntryReply { string journal_entry_uuid = 1; string status = 2; }
message JournalEntryByTransactionRequest { string transaction_uuid = 1; }
message JournalEntryLookupReply { bool found = 1; string journal_entry_uuid = 2; string status = 3; }
message InstitutionalAccountRequest { string functional_code = 1; }
message InstitutionalAccountReply { string functional_code = 1; string accounting_code = 2; string status = 3; }
message RunEodRequest { string accounting_date = 1; }
message EodReply { string eod_uuid = 1; string status = 2; }
message TrialBalanceRequest { string accounting_date = 1; }
message TrialBalanceReply { string balance_uuid = 1; string status = 2; }
