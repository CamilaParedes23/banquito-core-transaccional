syntax = "proto3";

package banquito.platform.document.v1;

option java_multiple_files = true;
option java_package = "com.banquito.platform.document.infrastructure.grpc";
option java_outer_classname = "DocumentServiceProto";

service DocumentQueryService {
  rpc RegisterDocument(RegisterDocumentRequest) returns (DocumentMetadataResponse);
  rpc GetDocumentMetadata(GetDocumentMetadataRequest) returns (DocumentMetadataResponse);
  rpc RegisterDocumentVersion(RegisterDocumentVersionRequest) returns (DocumentVersionResponse);
  rpc AttachDocumentToBusinessReference(AttachDocumentRequest) returns (DocumentMetadataResponse);
}

message RegisterDocumentRequest {
  string business_context = 1;
  string document_type = 2;
  string business_reference_uuid = 3;
  string file_name = 4;
  string mime_type = 5;
  string storage_path = 6;
  string hash_sha256 = 7;
  string created_by = 8;
  string correlation_id = 9;
  string content_base64 = 10;
  string text_payload = 11;
  string metadata_json = 12;
}

message GetDocumentMetadataRequest {
  string document_uuid = 1;
}

message RegisterDocumentVersionRequest {
  string document_uuid = 1;
  string file_name = 2;
  string mime_type = 3;
  string storage_path = 4;
  string hash_sha256 = 5;
  string created_by = 6;
  string content_base64 = 7;
  string text_payload = 8;
}

message AttachDocumentRequest {
  string document_uuid = 1;
  string business_reference_uuid = 2;
  string correlation_id = 3;
}

message DocumentMetadataResponse {
  string document_uuid = 1;
  string business_context = 2;
  string document_type = 3;
  string business_reference_uuid = 4;
  string file_name = 5;
  string mime_type = 6;
  string storage_path = 7;
  string hash_sha256 = 8;
  string status = 9;
  string created_at = 10;
  string created_by = 11;
  string correlation_id = 12;
  string metadata_json = 13;
}

message DocumentVersionResponse {
  string version_uuid = 1;
  string document_uuid = 2;
  int32 version_number = 3;
  string status = 4;
  string file_name = 5;
  string mime_type = 6;
  string storage_path = 7;
  string hash_sha256 = 8;
  string created_at = 9;
  string created_by = 10;
}
