server:
  port: ${SERVER_PORT:8085}
  forward-headers-strategy: framework

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:core-account-service}
  datasource:
    url: ${ACCOUNT_DB_URL:${DB_URL:jdbc:mysql://mysql-account:3306/banquito_core_account_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil}}
    username: ${ACCOUNT_DB_USER:${DB_USERNAME:root}}
    password: ${ACCOUNT_DB_PASSWORD:${DB_PASSWORD:${MYSQL_ROOT_PASSWORD:BanQuitoRoot2026!}}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        jdbc:
          time_zone: ${APP_TIMEZONE:America/Guayaquil}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:when_authorized}
  health:
    db:
      enabled: true

springdoc:
  api-docs:
    path: ${OPENAPI_DOCS_PATH:/api-docs}
  swagger-ui:
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}

banquito:
  security:
    jwt:
      issuer: ${JWT_ISSUER:banquito-identity-access}
      secret: ${JWT_SECRET:BanQuitoIdentityJwtSecretKeyForDevelopmentOnlyChangeMe2026}
  account:
    default-accounting-date-source: ${ACCOUNTING_DATE_SOURCE:local}
    recent-transactions-limit: ${RECENT_TRANSACTIONS_LIMIT:20}
  integration:
    customer-grpc-host: ${CUSTOMER_GRPC_HOST:core-customer-service}
    customer-grpc-port: ${CUSTOMER_GRPC_PORT:9092}
    admin-grpc-host: ${ADMIN_GRPC_HOST:core-admin-service}
    admin-grpc-port: ${ADMIN_GRPC_PORT:9093}
    accounting-grpc-host: ${ACCOUNTING_GRPC_HOST:core-accounting-service}
    accounting-grpc-port: ${ACCOUNTING_GRPC_PORT:9094}
    notification-service-url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8087}
    document-service-url: ${DOCUMENT_SERVICE_URL:http://document-service:8086}
