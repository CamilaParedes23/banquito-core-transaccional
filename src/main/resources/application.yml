server:
  port: ${SERVER_PORT:8085}
  forward-headers-strategy: framework

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:core-account-service}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${ACCOUNT_DB_URL:${DB_URL:jdbc:mysql://localhost:33064/banquito_core_account_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil}}
    username: ${ACCOUNT_DB_USER:${DB_USERNAME:root}}
    password: ${ACCOUNT_DB_PASSWORD:${DB_PASSWORD:BanQuitoRoot2026!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        jdbc:
          time_zone: ${APP_TIMEZONE:America/Guayaquil}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:always}
  health:
    db:
      enabled: true

springdoc:
  api-docs:
    path: ${OPENAPI_DOCS_PATH:/api-docs}
  swagger-ui:
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}

banquito:
  security:
    jwt:
      issuer: ${JWT_ISSUER:banquito-identity-access}
      secret: ${JWT_SECRET:BanQuitoIdentityJwtSecretKeyForDevelopmentOnlyChangeMe2026}
  account:
    default-accounting-date-source: ${ACCOUNTING_DATE_SOURCE:local}
    recent-transactions-limit: ${RECENT_TRANSACTIONS_LIMIT:20}
    idempotency:
      p2p-required: ${P2P_IDEMPOTENCY_REQUIRED:false}
      ttl-hours: ${IDEMPOTENCY_TTL_HOURS:24}
  integration:
    customer-grpc-host: ${CUSTOMER_GRPC_HOST:core-customer-service}
    customer-grpc-port: ${CUSTOMER_GRPC_PORT:9092}
    admin-grpc-host: ${ADMIN_GRPC_HOST:core-admin-service}
    admin-grpc-port: ${ADMIN_GRPC_PORT:9093}
    accounting-grpc-host: ${ACCOUNTING_GRPC_HOST:core-accounting-service}
    accounting-grpc-port: ${ACCOUNTING_GRPC_PORT:9094}
    notification-grpc-host: ${NOTIFICATION_GRPC_HOST:notification-service}
    notification-grpc-port: ${NOTIFICATION_GRPC_PORT:9097}
    document-grpc-host: ${DOCUMENT_GRPC_HOST:document-service}
    document-grpc-port: ${DOCUMENT_GRPC_PORT:9096}
    grpc-timeout-ms: ${INTERNAL_GRPC_TIMEOUT_MS:10000}
    internal-service-key: ${INTERNAL_SERVICE_KEY:BanQuitoInternalServiceKey2026ChangeMe}
    outbox:
      enabled: ${OUTBOX_DISPATCH_ENABLED:true}
      fixed-delay-ms: ${OUTBOX_DISPATCH_FIXED_DELAY_MS:5000}
      batch-size: ${OUTBOX_DISPATCH_BATCH_SIZE:20}
      max-attempts: ${OUTBOX_DISPATCH_MAX_ATTEMPTS:5}
